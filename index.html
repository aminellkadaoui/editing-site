<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amine Editing Team</title>
<meta name="description" content="Make your reels stop the scroll & drive results.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== الخطوط المحلية ===== */
@font-face{font-family:'Satoshi';src:url('fonts/Satoshi-Light.otf') format('opentype');font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:'Satoshi';src:url('fonts/Satoshi-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Satoshi';src:url('fonts/Satoshi-Medium.otf') format('opentype');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'Satoshi';src:url('fonts/Satoshi-Bold.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:'Satoshi';src:url('fonts/Satoshi-Black.otf') format('opentype');font-weight:900;font-style:normal;font-display:swap}
@font-face{font-family:'Instrument Serif';src:url('fonts/instrumentserif-regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Instrument Serif';src:url('fonts/instrumentserif-italic.ttf') format('truetype');font-weight:400;font-style:italic;font-display:swap}

:root{
  --blue:#0f6bff;--btn:#0066ff;--ink:#000;--soft:#424242;--label:#3f8bff;--bg:#fff;
  --sans:'Satoshi',system-ui,-apple-system,sans-serif;
  --serif:'Instrument Serif',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{position:relative;font-family:var(--sans);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{max-width:100%;display:block}
.wrap{max-width:1128px;margin:0 auto;padding:0 20px}
main{position:relative;z-index:1}

/* ===== NAVBAR — بار عائم زجاجي مضغوط · بلا ظل ===== */
.navbar{direction:ltr;position:sticky;top:12px;z-index:100;margin:12px auto 0;width:min(940px,92vw);
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;
  padding:8px;border-radius:999px;
  background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(233,241,255,.9));
  border:1px solid rgba(15,107,255,.16);
  backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%)}
.lang-seg{grid-column:1;display:inline-flex;gap:2px;padding:4px;border-radius:999px;
  background:#fff;border:1px solid rgba(15,107,255,.2)}
.lang-seg button{font-family:var(--sans);font-size:12.5px;font-weight:600;line-height:1;color:#64748b;
  border:0;background:transparent;cursor:pointer;padding:7px 11px;border-radius:999px;transition:color .18s ease,background .18s ease;
  outline:none;-webkit-tap-highlight-color:transparent}
.lang-seg button:hover{color:var(--btn)}
.lang-seg button.active{background:var(--btn);color:#fff}
.nav-links{grid-column:2;display:flex;gap:28px;justify-content:center}
.nav-links a{font-family:var(--sans);font-size:14px;font-weight:500;color:#334155;transition:color .2s ease}
.nav-links a:hover{color:var(--btn)}
.btn.sm{min-width:auto;height:40px;padding:0 20px;font-size:17px}
@media(max-width:620px){.nav-links{display:none}.lang-seg button{padding:6px 9px;font-size:12px}.btn.sm{padding:0 16px;font-size:16px}}

/* ===== دعم العربية / الدارجة (RTL) ===== */
body.rtl{font-family:'IBM Plex Sans Arabic',var(--sans)}
body.rtl .hero h1{font-family:'IBM Plex Sans Arabic',sans-serif;text-transform:none;letter-spacing:-.03em;line-height:1.18;color:#101010;font-weight:500;font-size:clamp(27px,4.2vw,39px)}
body.rtl .hero h1 .b{font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:700;font-size:1.4em;color:#101010}
body.rtl .hero h1 .s{display:inline-block;font-family:'IBM Plex Sans Arabic',sans-serif;font-style:normal;font-weight:700;font-size:1.4em;line-height:1.1;
  color:#0F6BFF;-webkit-text-fill-color:#0F6BFF;background:none;filter:none}
body.rtl .final h2{font-family:'IBM Plex Sans Arabic',sans-serif;text-transform:none;letter-spacing:-.02em;line-height:1.3}
body.rtl .final h2 .s{font-family:'IBM Plex Sans Arabic',sans-serif;font-style:normal;font-weight:700;font-size:1em}
body.rtl .sub,body.rtl .final p,body.rtl .nav-links a,body.rtl .work h2,body.rtl .work .label span,body.rtl .proc-head h2,body.rtl .proc-head p,body.rtl .proc-card h3,body.rtl .proc-card p{font-family:'IBM Plex Sans Arabic',sans-serif}
body.rtl .btn{font-family:'IBM Plex Sans Arabic',sans-serif;font-style:normal;font-weight:600;font-size:18px}

/* ===== الزر ===== */
.btn{position:relative;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;
  background:var(--btn);color:#fff;text-decoration:none;
  min-width:200px;height:52px;padding:0 32px;border-radius:60px;
  font-family:var(--serif);font-style:italic;font-size:25px;line-height:1;
  box-shadow:0 0 19px rgba(46,133,255,.34),inset 0 1px 0 rgba(255,255,255,.3),inset 0 -1px 0 rgba(0,0,0,.12);
  transition:transform .22s ease-out,box-shadow .22s ease}
.btn span{position:relative;z-index:1}
.btn:hover{transform:scale(1.05);box-shadow:0 0 28px rgba(46,133,255,.5),inset 0 1px 0 rgba(255,255,255,.38),inset 0 -1px 0 rgba(0,0,0,.12)}
.btn:active{transform:scale(.98)}
.btn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;pointer-events:none;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);
  transform:skewX(-20deg);transition:left 650ms ease}
.btn:hover::after{left:150%}

/* ===== فيديو بضغطة ===== */
.ratio{position:relative;background:#000;overflow:hidden;cursor:pointer;border-radius:inherit}
.ratio.wide{aspect-ratio:16/9}
.ratio.tall{aspect-ratio:9/16}
.ratio img.thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.ratio:hover img.thumb{transform:scale(1.05)}
.ratio .play{position:absolute;inset:0;display:grid;place-items:center;z-index:2}
.ratio .play svg{width:68px;height:48px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.ratio .play path.bg{fill:#212121;fill-opacity:.8;transition:fill-opacity .15s}
.ratio:hover .play path.bg{fill:#ff0000;fill-opacity:1}
.ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:0;z-index:3}

/* ===== HERO ===== */
.hero{display:flex;flex-direction:column;align-items:center;padding:30px 20px 0;gap:0}
.hero .top{display:flex;flex-direction:column;align-items:center;gap:12px;max-width:720px;padding:8px 0 16px}
.hero h1{font-family:var(--sans);font-weight:400;font-size:clamp(34px,5.4vw,50px);
  line-height:1.1537;text-align:center;text-transform:capitalize;letter-spacing:-.01em}
.hero h1 .b{font-weight:900}
.hero h1 .s{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--blue);
  font-size:1.24em;text-transform:none;letter-spacing:0}
.hero .sub{font-weight:300;font-size:clamp(16px,2vw,20px);color:var(--soft);text-align:center;line-height:1.45;max-width:720px}
.hero .hero-tag{font-weight:600;font-size:clamp(14px,1.6vw,17px);color:var(--ink);text-align:center;line-height:1.5;max-width:640px;margin:2px auto 0}
.dash{margin:0 auto;width:min(840px,92vw);aspect-ratio:840/473;
  border:.6px solid #3b3b3b;border-radius:clamp(30px,4.5vw,60px);overflow:hidden;background:#000}
.hero-cta{margin-top:44px}

/* ===== BEST WORK ===== */
.work{padding:96px 0 0;scroll-margin-top:120px}
.work .title{display:flex;flex-direction:column;align-items:center;gap:13px;margin-bottom:48px}
.work .label{display:flex;align-items:center;gap:13px}
.work .label .l{width:39px;height:2px;border-radius:2px;background:var(--label)}
.work .label span{font-family:var(--sans);font-weight:500;font-size:16px;color:var(--label)}
.work h2{font-family:var(--sans);font-weight:700;font-size:30px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.reel{position:relative;border-radius:30px;background:#000;aspect-ratio:9/16}
.reel .ratio{position:absolute;inset:0;border-radius:30px;overflow:hidden}
.reel .views{position:absolute;top:-19px;left:50%;transform:translateX(-50%);z-index:6;
  display:flex;align-items:center;gap:8px;white-space:nowrap;
  background:rgba(12,12,14,.66);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:9px 18px;
  color:#fff;font-family:var(--sans);font-weight:500;font-size:19px;
  box-shadow:0 10px 24px rgba(0,0,0,.28);pointer-events:none}
.reel .views svg{width:23px;height:17px;flex-shrink:0}

/* ===== OUR PROCESS ===== */
.process{padding:96px 0 0;scroll-margin-top:120px}
.proc-head{text-align:center;max-width:640px;margin:0 auto 48px}
.proc-head .label{display:flex;align-items:center;justify-content:center;gap:13px;margin-bottom:14px}
.proc-head .label .l{width:39px;height:2px;border-radius:2px;background:var(--label)}
.proc-head .label span{font-family:var(--sans);font-weight:500;font-size:16px;color:var(--label)}
.proc-head h2{font-family:var(--sans);font-weight:700;font-size:clamp(26px,3.2vw,34px);letter-spacing:-.01em}
.proc-head p{color:var(--soft);font-weight:400;font-size:clamp(15px,1.7vw,18px);margin-top:12px;line-height:1.6}
.proc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.proc-card{background:#fff;border:1px solid #e8ecf3;border-radius:20px;padding:30px 26px;
  transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease}
.proc-card:hover{transform:translateY(-4px);border-color:rgba(15,107,255,.3)}
.proc-num{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:14px;
  background:linear-gradient(180deg,#e9f1ff,#dbe8ff);color:var(--btn);
  font-family:var(--sans);font-weight:700;font-size:18px;margin-bottom:18px}
.proc-card h3{font-family:var(--sans);font-weight:700;font-size:18px;margin-bottom:10px}
.proc-card p{color:var(--soft);font-weight:400;font-size:14.5px;line-height:1.7}
@media(max-width:820px){.proc-grid{grid-template-columns:1fr;gap:16px;max-width:520px;margin:0 auto}}

/* ===== FINAL CTA ===== */
.final{position:relative;text-align:center;padding:96px 20px 150px;overflow:hidden}
.final::before{content:"";position:absolute;left:50%;bottom:-30%;transform:translateX(-50%);
  width:1000px;max-width:150vw;height:650px;z-index:0;pointer-events:none;
  background:radial-gradient(50% 50% at 50% 100%,rgba(15,107,255,.30),transparent 70%);filter:blur(50px);opacity:.65}
.final>*{position:relative;z-index:1}
.final h2{font-family:var(--sans);font-weight:700;font-size:clamp(26px,3.6vw,35px);text-align:center;line-height:1.2}
.final h2 .s{font-family:var(--serif);font-style:italic;font-weight:400;font-size:1.14em}
.final p{font-weight:300;font-size:clamp(16px,2vw,20px);color:var(--soft);margin-top:6px;line-height:1.5}
.final .btn{margin-top:34px}

footer{text-align:center;padding:28px 20px;color:var(--soft);font-size:14px;font-weight:400}
footer b{color:var(--ink);font-weight:700}

@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);gap:22px}}
@media(max-width:560px){
  .hero{padding-top:20px}
  .grid{grid-template-columns:1fr 1fr;gap:14px}
  .reel .views{font-size:15px;padding:6px 13px;top:-15px}
  .reel .views svg{width:18px;height:13px}
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="lang-seg" id="langSeg">
    <button data-lang="en">EN</button>
    <button data-lang="ar">AR</button>
    <button data-lang="darija">DAR</button>
  </div>
  <div class="nav-links">
    <a href="#home" id="nl-home"></a>
    <a href="#work" id="nl-reels"></a>
    <a href="#contact" id="nl-contact"></a>
  </div>
  <a class="btn sm" id="navCta" href="#"><span id="navCtaText"></span></a>
</nav>

<main>
  <!-- HERO -->
  <header class="hero" id="home">
    <div class="top">
      <h1 id="heroTitle"></h1>
      <p class="sub" id="heroSub"></p>
      <p class="hero-tag" id="heroTag"></p>
    </div>
    <div class="dash"><div class="ratio wide" id="heroVideo"></div></div>
    <div class="hero-cta"><a class="btn" id="heroCta" href="#"><span id="heroCtaText">Apply Now</span></a></div>
  </header>

  <!-- BEST WORK -->
  <section class="work wrap" id="work">
    <div class="title">
      <div class="label"><span class="l"></span><span id="workLabel">Portfolio</span><span class="l"></span></div>
      <h2 id="workTitle">My Best Work</h2>
    </div>
    <div class="grid" id="reelsGrid"></div>
  </section>

  <!-- OUR PROCESS -->
  <section class="process wrap" id="process">
    <div class="proc-head">
      <div class="label"><span class="l"></span><span id="procLabel"></span><span class="l"></span></div>
      <h2 id="procTitle"></h2>
      <p id="procSub"></p>
    </div>
    <div class="proc-grid" id="procGrid"></div>
  </section>

  <!-- FINAL CTA -->
  <section class="final" id="contact">
    <h2 id="finalTitle"></h2>
    <p id="finalLine1"></p>
    <p id="finalLine2"></p>
    <a class="btn" id="finalCta" href="#"><span id="finalCtaText">Apply Now</span></a>
  </section>
</main>

<footer>© <span id="year"></span> <b id="brandName">Amine Editing Team</b></footer>

<script src="config.js"></script>
<script>
const C = (function(){
  try{ const ls = localStorage.getItem('SITE_CONFIG'); if(ls) return JSON.parse(ls); }catch(e){}
  return window.SITE_CONFIG;
})();

const PLAY = '<div class="play"><svg viewBox="0 0 68 48"><path class="bg" d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z"/><path d="M45,24 27,14 27,34" fill="#fff"/></svg></div>';
const thumb = id => 'https://i.ytimg.com/vi_webp/'+id+'/maxresdefault.webp';
const thumbFallback = id => 'https://i.ytimg.com/vi/'+id+'/hqdefault.jpg';
const embed = id => 'https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1&playsinline=1&iv_load_policy=3&autoplay=1';

function videoBox(el, id){
  el.innerHTML = '<img class="thumb" src="'+thumb(id)+'" alt="" loading="lazy" onerror="this.onerror=null;this.src=\''+thumbFallback(id)+'\'">'+PLAY;
  el.addEventListener('click', ()=>{
    el.innerHTML = '<iframe src="'+embed(id)+'" allow="accelerometer;autoplay;encrypted-media;gyroscope;picture-in-picture;fullscreen" allowfullscreen></iframe>';
  }, {once:true});
}

/* ===== الريلز والفيديو (مستقلة عن اللغة) ===== */
videoBox(document.getElementById('heroVideo'), C.hero.videoId);
const EYE = '<svg viewBox="0 0 25.633 18.419"><path d="M12.977 3.425c.904 0 1.22 1.079.843 1.9-.413.903-.512 1.839-.218 2.707.705 2.085 3.451 3.105 6.518 2.602.182-.03.354.103.354.288 0 4.14-3.356 7.497-7.497 7.497s-7.496-3.357-7.496-7.497 3.356-7.497 7.496-7.497z" fill="#fff"/><path d="M0 9.27S4.192.17 12.897 0c10.076 0 12.736 8.705 12.736 8.705" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round"/></svg>';
const grid = document.getElementById('reelsGrid');
(C.reels||[]).forEach(r=>{
  const card = document.createElement('div'); card.className = 'reel';
  const box = document.createElement('div'); box.className = 'ratio tall';
  videoBox(box, r.id); card.appendChild(box);
  if(r.views){ const v=document.createElement('div'); v.className='views'; v.innerHTML=EYE+'<span>'+r.views+'</span>'; card.appendChild(v); }
  grid.appendChild(card);
});

/* ===== روابط الحجز (مرة واحدة) ===== */
['heroCta','finalCta','navCta'].forEach(id=>{
  const el = document.getElementById(id);
  el.href = C.bookACallUrl || '#';
  if(C.bookACallUrl && C.bookACallUrl !== '#'){ el.target='_blank'; el.rel='noopener'; }
});
document.getElementById('brandName').textContent = C.brand || 'Amine Editing Team';
document.getElementById('year').textContent = new Date().getFullYear();
document.title = C.brand || 'Amine Editing Team';

/* ===== تبديل اللغة: English / العربية / Darija ===== */
const LANGS = ['en','ar','darija'];
const T = lang => (lang!=='en' && C.i18n && C.i18n[lang]) ? C.i18n[lang] : null;
function pack(lang){
  const t = T(lang) || {};
  return {
    hero: Object.assign({}, C.hero, t.hero||{}),
    closing: Object.assign({}, C.closing, t.closing||{}),
    nav: Object.assign({home:'Home',reels:'Reels',contact:'Contact'}, C.nav||{}, t.nav||{}),
    workLabel: t.workLabel || C.workLabel,
    workTitle: t.workTitle || C.workTitle,
    btn: t.bookACallText || C.bookACallText || 'Apply Now'
  };
}
function applyLang(lang){
  const M = pack(lang);
  let hh = M.hero.line1 + '<br>';
  if(M.hero.line2){ hh += '<span class="b">' + M.hero.line2 + '</span>'; }
  if(M.hero.line3){ hh += (M.hero.line2 ? ' ' : '') + '<span class="s">' + M.hero.line3 + '</span>'; }
  document.getElementById('heroTitle').innerHTML = hh;
  document.getElementById('heroSub').textContent = M.hero.subtitle;
  const _tag = M.hero.tagline || '';
  document.getElementById('heroTag').textContent = _tag;
  document.getElementById('heroTag').style.display = _tag ? '' : 'none';
  document.getElementById('workLabel').textContent = M.workLabel;
  document.getElementById('workTitle').textContent = M.workTitle;
  document.getElementById('finalTitle').innerHTML =
    M.closing.titlePlain + ' <span class="s">' + M.closing.titleAccent + '</span>';
  document.getElementById('finalLine1').textContent = M.closing.line1;
  document.getElementById('finalLine2').textContent = M.closing.line2;
  /* طريقة العمل */
  const proc = (T(lang) && T(lang).process) ? T(lang).process : C.process;
  if(proc){
    document.getElementById('procLabel').textContent = proc.label || '';
    document.getElementById('procTitle').textContent = proc.title;
    document.getElementById('procSub').textContent = proc.subtitle;
    const pg = document.getElementById('procGrid'); pg.innerHTML = '';
    (proc.steps||[]).forEach((s,i)=>{
      const c = document.createElement('div'); c.className = 'proc-card';
      c.innerHTML = '<div class="proc-num">'+String(i+1).padStart(2,'0')+'</div><h3></h3><p></p>';
      c.querySelector('h3').textContent = s.title;
      c.querySelector('p').textContent = s.desc;
      pg.appendChild(c);
    });
  }
  document.getElementById('nl-home').textContent = M.nav.home;
  document.getElementById('nl-reels').textContent = M.nav.reels;
  document.getElementById('nl-contact').textContent = M.nav.contact;
  ['heroCtaText','finalCtaText','navCtaText'].forEach(id=> document.getElementById(id).textContent = M.btn);
  document.querySelectorAll('#langSeg button').forEach(b=> b.classList.toggle('active', b.dataset.lang===lang));
  const rtl = (lang === 'ar');            /* الدارجة لاتينية = LTR */
  document.documentElement.dir = rtl ? 'rtl' : 'ltr';
  document.documentElement.lang = lang==='darija' ? 'ar-MA' : lang;
  document.body.classList.toggle('rtl', rtl);
  try{ localStorage.setItem('lang', lang); }catch(e){}
}
let lang = 'en';
try{ const s = localStorage.getItem('lang'); if(s && LANGS.includes(s)) lang = s; }catch(e){}
applyLang(lang);
document.querySelectorAll('#langSeg button').forEach(b=>{
  b.addEventListener('click', ()=> applyLang(b.dataset.lang));
});
</script>
</body>
</html>
